name: Build and Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.version.outputs.build_version }}
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      release_version: ${{ steps.version.outputs.release_version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            latest_tag="$(git describe --tags --abbrev=0 --match 'v*' --exclude 'v*-r*')"
            latest_version="${latest_tag#v}"
            version_code="${latest_version#*+}"
            if [ "$version_code" = "$latest_version" ]; then
              version_code=""
            fi

            version_name="$(git describe --long --tags --match 'v*' --exclude 'v*-r*' | sed -E 's/^v//;s/\+[0-9]+//;s/-([0-9]+)-g/-r\1.g/')"
            build_version="$version_name"
            if [ -n "$version_code" ]; then
              build_version="$version_name+$version_code"
            fi

            release_version="v$version_name"
            prerelease="true"
          else
            build_version="${{ github.ref_name }}"
            version_string="${build_version#v}"
            version_name="${version_string%%+*}"
            version_code="${version_string#*+}"
            if [ "$version_code" = "$version_string" ]; then
              version_code=""
            fi
            release_version="${{ github.ref_name }}"
            prerelease="false"
          fi

          echo "build_version=$build_version" >> "$GITHUB_OUTPUT"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  build-linux-android:
    needs: prepare-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev locate libfuse2

      - name: Install AppImage tool
        run: |
          wget -nv -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Fastforge
        run: dart pub global activate fastforge

      - name: Add path
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Get dependencies
        run: flutter pub get

      - name: Set release version
        env:
          VERSION: ${{ needs.prepare-version.outputs.build_version }}
        run: |
          version="${VERSION#v}"
          VERSION="$version" perl -0pi -e 's/^version: .*/version: $ENV{VERSION}/m' pubspec.yaml

      - name: Decode Keystore for Android build
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks

      - name: Build Linux and Android
        env:
          RELEASE_VERSION: ${{ needs.prepare-version.outputs.build_version }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/upload-keystore.jks
        run: |
          fastforge release --name production --skip-jobs=release-macos-zip
          bash ./.github/fix-fastforge-artifacts.sh

      - name: Upload Linux and Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-android-dist
          path: dist/**/*

  build-macos:
    needs: prepare-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Fastforge
        run: dart pub global activate fastforge

      - name: Add path
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Get dependencies
        run: flutter pub get

      - name: Set release version
        env:
          VERSION: ${{ needs.prepare-version.outputs.build_version }}
        run: |
          version="${VERSION#v}"
          VERSION="$version" perl -0pi -e 's/^version: .*/version: $ENV{VERSION}/m' pubspec.yaml

      - name: Build macOS
        env:
          RELEASE_VERSION: ${{ needs.prepare-version.outputs.build_version }}
        run: fastforge release --name production --jobs=release-macos-zip

      - name: Normalize macOS artifact names
        env:
          RELEASE_VERSION: ${{ needs.prepare-version.outputs.build_version }}
        run: |
          version_string="${RELEASE_VERSION#v}"
          version_name="${version_string%%+*}"
          dist_dir="dist/$version_string"
          if [ ! -d "$dist_dir" ] && [ -d dist ]; then
            dist_dir="$(find dist -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)"
          fi
          [ -n "$dist_dir" ] && [ -d "$dist_dir" ] || exit 0

          for artifact in "$dist_dir"/*; do
            [ -e "$artifact" ] || continue
            filename="$(basename "$artifact")"
            target="$dist_dir/${filename//$version_string/$version_name}"
            if [ "$target" != "$artifact" ]; then
              mv "$artifact" "$target"
            fi
          done

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dist
          path: dist/**/*

  release:
    needs:
      - prepare-version
      - build-linux-android
      - build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate Release Notes
        env:
          RELEASE_VERSION: ${{ needs.prepare-version.outputs.release_version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PRERELEASE: ${{ needs.prepare-version.outputs.prerelease }}
        run: |
          bash ./.github/generate-release-notes.sh

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-version.outputs.release_version }}
          prerelease: ${{ needs.prepare-version.outputs.prerelease }}
          body_path: release.md
          files: |
            dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
