name: fluent_lyrics
description: "Fluent Lyrics, a lyrics viewer supports various sources."

version: 0.0.28+28

publish_to: 'none'

environment:
  sdk: ^3.10.4

isar_version: &isar_version 3.3.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  scrollable_positioned_list: ^0.3.8
  provider: ^6.1.5+1
  http: ^1.6.0
  shared_preferences: ^2.5.1
  dbus: ^0.7.11
  crypto: ^3.0.7
  encrypt: ^5.0.3
  async: ^2.13.0
  isar_community: *isar_version
  isar_community_flutter_libs: *isar_version
  path_provider: ^2.1.5
  package_info_plus: ^9.0.0
  html_unescape: ^2.0.0
  wakelock_plus: ^1.5.1
  string_similarity: ^2.0.0
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_community_generator: *isar_version
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/album_art.png

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/google/Outfit/VariableFont_wght.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/icons/logo.png"
  min_sdk_android: 28
  adaptive_icon_background: "assets/icons/adaptive_icon_background.png"
  adaptive_icon_foreground: "assets/icons/adaptive_icon_foreground.png"
  adaptive_icon_foreground_inset: 16
  adaptive_icon_monochrome: "assets/icons/adaptive_icon_foreground.png"

